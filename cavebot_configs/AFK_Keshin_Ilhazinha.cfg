label:INICIO ILHAZINHA
function:[[

local player = g_game.getLocalPlayer()

if not player then return false end

local pos = player:getPosition()

local inIlhazinha = (pos.x >= 1080 and pos.x <= 1900 and pos.y >= 1660 and pos.y <= 2250 and pos.z >= 6 and pos.z <= 9)

local inKumo      = (pos.x >= 2290 and pos.x <= 2360 and pos.y >= 1480 and pos.y <= 1530 and pos.z == 5)

if not inIlhazinha and not inKumo then

    gotoLabel("RECOVERY")

    return "retry"

end

return true


]]
