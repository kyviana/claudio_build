label:INTERAGIR ZOLTAN
delay:500
npcsay:hi
delay:1500
function:[[
local root = g_ui:getRootWidget()
local zoltan = root:getChildById("zoltanWindow")
if not zoltan then
    warn("[ZOLTAN] Janela nao abriu, tentando novamente...")
    npcsay("hi")
    delay(1500)
    return "retry"
end
delay(1000)
zoltan = root:getChildById("zoltanWindow")
if not zoltan then return "retry" end
local statusLabel = zoltan:getChildById("statusLabel")
local status = statusLabel and statusLabel:getText():lower() or ""
warn("[ZOLTAN] Status: " .. status)
local function fecharZoltan()
    local z = root:getChildById("zoltanWindow")
    if z then
        local cb = z:getChildById("closeButton")
        if cb then cb:onClick() end
    end
end
local function fecharSucesso()
    delay(800)
    for _, w in ipairs(root:getChildren()) do
        local msgLabel = w:getChildById("messageBoxLabel")
        if msgLabel then
            local holder = w:getChildById("buttonHolder")
            if holder then
                for _, btn in ipairs(holder:getChildren()) do
                    btn:onClick()
                    warn("[ZOLTAN] Janela de sucesso fechada!")
                    break
                end
            end
            break
        end
    end
    delay(500)
end
local function identificarMonstro()
    local z = root:getChildById("zoltanWindow")
    if not z then return end
    local textoEncontrado = ""
    local function scan(widget)
        if textoEncontrado ~= "" then return end
        local t = widget.getText and widget:getText():lower() or ""
        if t:find("matar ") then textoEncontrado = t end
        for _, child in ipairs(widget:getChildren()) do scan(child) end
    end
    scan(z)
    warn("[ZOLTAN] Texto: " .. textoEncontrado)
    if textoEncontrado:find("tsuyoi kyojin") then
        zoltan_monstro = "tsuyoi_kyojin"
        warn("[ZOLTAN] Monstro: tsuyoi kyojin!")
    else
        zoltan_monstro = "sem_cave"
        warn("[ZOLTAN] Sem cave: " .. textoEncontrado)
    end
    zoltan_kills = 0
    if saveZoltanState then saveZoltanState({ status = zoltan_monstro == "sem_cave" and "sem_cave" or "hunting" }) end
end
if status:find("cooldown") then
    warn("[ZOLTAN] Cooldown ativo, extraindo tempo restante...")
    -- Extrair tempo restante da janela
    local tempoRestante = 0
    local function scanTempo(widget)
        local t = widget.getText and widget:getText():lower() or ""
        local h, m = t:match("tempo restante: (%d+)h (%d+)min")
        if h and m then
            tempoRestante = (tonumber(h) * 3600) + (tonumber(m) * 60) + 120 -- +2min de segurança
        end
        for _, child in ipairs(widget:getChildren()) do scanTempo(child) end
    end
    local z = root:getChildById("zoltanWindow")
    if z then
        scanTempo(z)
        local cb = z:getChildById("closeButton")
        if cb then cb:onClick() end
    end
    -- Salvar tempo de fim do cooldown no JSON
    zoltan_cooldown_fim = os.time() + tempoRestante
    local q = string.char(34)
    local cn = zoltan_char_name or name()
    local mn = zoltan_monstro or ""
    local kn = tostring(zoltan_kills or 0)
    local ts = tostring(os.time())
    local cf = tostring(zoltan_cooldown_fim)
    local body = "{" ..
        q.."char"..q..":"..q..cn..q.."," ..
        q.."monstro"..q..":"..q..mn..q.."," ..
        q.."kills"..q..":"..kn.."," ..
        q.."total"..q..":500," ..
        q.."status"..q..":"..q.."cooldown"..q.."," ..
        q.."task_completa"..q..":false," ..
        q.."cooldown_fim"..q..":"..cf.."," ..
        q.."ultima_atualizacao"..q..":"..ts ..
        "}"
    g_resources.writeFileContents(zoltan_json_file, body)
    warn("[ZOLTAN] Cooldown fim em: " .. os.date("%H:%M", zoltan_cooldown_fim))
    gotoLabel("IR AO TRAINER")
    return "retry"
end
if status:find("task de fama ativa") or status:find("fama ativa") then
    warn("[ZOLTAN] Task ja ativa, identificando monstro...")
    identificarMonstro()
    fecharZoltan()
    return true
end
local bottomBar = zoltan:getChildById("bottomBar")
if not bottomBar then fecharZoltan() return true end
local btn2 = bottomBar:getChildById("actionButton2")
if btn2 and btn2:isVisible() and btn2:isEnabled() then
    warn("[ZOLTAN] Resgatando recompensa!")
    btn2:onClick()
    zoltan_task_completa = false
    delay(800)
    -- Fechar janela de sucesso se aparecer
    for _, w in ipairs(root:getChildren()) do
        local msgLabel = w:getChildById("messageBoxLabel")
        if msgLabel then
            local holder = w:getChildById("buttonHolder")
            if holder then
                for _, btn in ipairs(holder:getChildren()) do
                    btn:onClick()
                    warn("[ZOLTAN] Janela de sucesso fechada!")
                    break
                end
            end
            break
        end
    end
    delay(500)
    -- Pegar nova task imediatamente na mesma janela
    zoltan = root:getChildById("zoltanWindow")
    if zoltan then
        bottomBar = zoltan:getChildById("bottomBar")
    end
end
local btn1 = bottomBar and bottomBar:getChildById("actionButton1")
if btn1 and btn1:isVisible() and btn1:isEnabled() then
    warn("[ZOLTAN] Pegando nova task!")
    btn1:onClick()
    delay(1500)
    identificarMonstro()
end
fecharZoltan()
return true
]]
