label:SISTEMA ZOLTAN INIT
function:[[
-- FLAGS GLOBAIS DE CONTROLE
if zoltan_task_completa == nil then zoltan_task_completa = false end
if zoltan_cooldown_inicio == nil then zoltan_cooldown_inicio = 0 end
zoltan_monitorando = false  -- sempre re-registra o handler ao carregar
if zoltan_monstro == nil then zoltan_monstro = "" end
if zoltan_kills == nil then zoltan_kills = 0 end

-- SETUP DO JSON (variaveis globais para acesso em closures)
zoltan_tracker_dir = "jsoncavebot/"
zoltan_char_name = name()
zoltan_json_file = zoltan_tracker_dir .. "zoltan_" .. zoltan_char_name .. ".json"

if not g_resources.directoryExists(zoltan_tracker_dir) then
    g_resources.makeDir(zoltan_tracker_dir)
end

-- Salva estado atual no JSON
local function saveZoltanState(extraData)
    local data = {
        char            = charName,
        monstro         = zoltan_monstro or "",
        kills           = zoltan_kills or 0,
        total           = 500,
        status          = extraData and extraData.status or "hunting",
        task_completa   = zoltan_task_completa or false,
        cooldown_ate    = zoltan_cooldown_inicio > 0 and (zoltan_cooldown_inicio + 36000) or nil,
        ultima_atualizacao = os.time(),
    }
    if extraData then
        for k, v in pairs(extraData) do data[k] = v end
    end
    local ok, body = pcall(function() return json.encode(data, 2) end)
    if ok then
        g_resources.writeFileContents(zoltan_json_file, body)
    end
end

-- Carrega estado salvo se existir
local function loadZoltanState()
    if not g_resources.fileExists(zoltan_json_file) then return end
    local ok, data = pcall(function()
        return json.decode(g_resources.readFileContents(zoltan_json_file))
    end)
    if not ok or type(data) ~= "table" then return end

    zoltan_kills = data.kills or 0
    zoltan_monstro = data.monstro or ""
    zoltan_task_completa = data.task_completa or false

    -- Verificar cooldown salvo
    if data.cooldown_ate and data.cooldown_ate > os.time() then
        zoltan_cooldown_inicio = data.cooldown_ate - 36000
        warn("[ZOLTAN] Cooldown ativo ate " .. os.date("%H:%M", data.cooldown_ate))
    end

    -- Verificar se task expirou enquanto estava offline
    if data.task_expira_em and data.task_expira_em < os.time() and not data.task_completa then
        warn("[ZOLTAN] Task expirou enquanto offline. Indo pegar nova.")
        zoltan_ir_zoltan = true
    end

    warn("[ZOLTAN] Estado carregado: " .. zoltan_monstro .. " kills=" .. zoltan_kills)
end

-- Carregar estado ao iniciar (so uma vez)
if not zoltan_monitorando then
    loadZoltanState()
end

-- MONITOR DE CHAT: detecta progresso e conclusao da task
if not zoltan_monitorando then
    zoltan_monitorando = true

    onTextMessage(function(mode, text)
        local t = text:lower()
        local dirty = false

        if t:find("finalizou sua task de fama") or t:find("finalizou") and t:find("500") then
            zoltan_task_completa = true
            zoltan_ir_zoltan = true
            zoltan_status = "completa"
            dirty = true
            warn("[ZOLTAN] Task completa!")
        end

        local k = t:match("%[(%d+)/500%]")
        if k then
            zoltan_kills = tonumber(k)
            zoltan_status = "hunting"
            dirty = true
        end

        if t:find("voce atualmente deve abater") then
            local abateu = t:match("abateu (%d+) de um total")
            if abateu then
                zoltan_kills = tonumber(abateu)
                zoltan_status = "hunting"
                dirty = true
            end
        end

        if t:find("esta finalizada ou o tempo expirado") then
            zoltan_ir_zoltan = true
            if not zoltan_task_completa then
                zoltan_status = "expirada"
                dirty = true
            end
        end

        if dirty then
            local q = string.char(34)
            local cn = zoltan_char_name or name()
            local mn = zoltan_monstro or ""
            local kn = tostring(zoltan_kills or 0)
            local st = zoltan_status or "hunting"
            local cp = zoltan_task_completa and "true" or "false"
            local ts = tostring(os.time())
            local body = "{" ..
                q.."char"..q..":"..q..cn..q.."," ..
                q.."monstro"..q..":"..q..mn..q.."," ..
                q.."kills"..q..":"..kn.."," ..
                q.."total"..q..":500," ..
                q.."status"..q..":"..q..st..q.."," ..
                q.."task_completa"..q..":"..cp.."," ..
                q.."ultima_atualizacao"..q..":"..ts ..
                "}"
            g_resources.writeFileContents(zoltan_json_file, body)
        end
    end)
end

return true
]]
