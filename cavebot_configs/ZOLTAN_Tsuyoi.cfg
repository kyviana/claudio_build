delay:3000
function:[[
if zoltan_ir_zoltan then
    if not zoltan_cooldown_fim or zoltan_cooldown_fim == 0 then
        warn("[ZOLTAN] Sem tempo de cooldown salvo, aguardando 10min...")
        zoltan_cooldown_fim = os.time() + 600
    end
    local agora = os.time()
    local restante = zoltan_cooldown_fim - agora
    if restante > 0 then
        warn("[ZOLTAN] Cooldown: " .. math.floor(restante/3600) .. "h " .. math.floor((restante%3600)/60) .. "min restantes")
        delay(60000)
        return "retry"
    end
    warn("[ZOLTAN] Cooldown encerrado! Indo ao Zoltan.")
    zoltan_ir_zoltan = false
    zoltan_cooldown_fim = 0
    gotoLabel("TRAINER PARA ZOLTAN")
    return "retry"
end
return true
]]
