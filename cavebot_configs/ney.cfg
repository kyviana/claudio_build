label:INTERAGIR ZOLTAN
delay:500
npcsay:hi
delay:1500
function:[[
local root = g_ui:getRootWidget()
local zoltan = root:getChildById("zoltanWindow")
if not zoltan then
    warn("[ZOLTAN] Janela nao abriu, tentando novamente...")
    npcsay("hi")
    delay(1500)
    return "retry"
end

-- Aguardar janela carregar completamente
delay(1000)
zoltan = root:getChildById("zoltanWindow")
if not zoltan then return "retry" end

-- Ler status atual
local statusLabel = zoltan:getChildById("statusLabel")
local status = statusLabel and statusLabel:getText():lower() or ""
warn("[ZOLTAN] Status: " .. status)

-- Helper: fechar janela do Zoltan
local function fecharZoltan()
    local z = root:getChildById("zoltanWindow")
    if z then
        local cb = z:getChildById("closeButton")
        if cb then cb:onClick() end
    end
end

-- Helper: fechar janela de sucesso de recompensa
local function fecharSucesso()
    delay(800)
    for _, w in ipairs(root:getChildren()) do
        local msgLabel = w:getChildById("messageBoxLabel")
        if msgLabel then
            local holder = w:getChildById("buttonHolder")
            if holder then
                for _, btn in ipairs(holder:getChildren()) do
                    btn:onClick()
                    warn("[ZOLTAN] Janela de sucesso fechada!")
                    break
                end
            end
            break
        end
    end
    delay(500)
end

-- Helper: identificar monstro pelo sectionLabel
local function identificarMonstro()
    local z = root:getChildById("zoltanWindow")
    local secLabel = z and z:getChildById("sectionLabel")
    local secText = secLabel and secLabel:getText():lower() or ""
    warn("[ZOLTAN] sectionLabel: " .. secText)
    if secText:find("tsuyoi kyojin") then
        zoltan_monstro = "tsuyoi_kyojin"
        warn("[ZOLTAN] Monstro: tsuyoi kyojin -> indo pra cave!")
    elseif secText:find("jaakuna tako") then
        zoltan_monstro = "jaakuna_tako"
        warn("[ZOLTAN] Monstro: jaakuna tako -> indo pra cave!")
    else
        zoltan_monstro = "sem_cave"
        warn("[ZOLTAN] Monstro sem cave: " .. secText)
    end
end

-- CASO 1: Task ja ativa
if status:find("task de fama ativa") or status:find("ativa") then
    warn("[ZOLTAN] Task ja ativa, identificando monstro...")
    identificarMonstro()
    fecharZoltan()
    return true
end

local bottomBar = zoltan:getChildById("bottomBar")
if not bottomBar then
    warn("[ZOLTAN] bottomBar nao encontrada")
    fecharZoltan()
    return true
end

-- CASO 2: Resgatar recompensa (btn2 visivel)
local btn2 = bottomBar:getChildById("actionButton2")
if btn2 and btn2:isVisible() and btn2:isEnabled() then
    warn("[ZOLTAN] Resgatando recompensa!")
    btn2:onClick()
    zoltan_task_completa = false
    fecharSucesso()
    -- Reabrir janela para pegar nova task
    delay(500)
    npcsay("hi")
    delay(1500)
    zoltan = root:getChildById("zoltanWindow")
    if not zoltan then return "retry" end
    delay(1000)
    bottomBar = zoltan:getChildById("bottomBar")
end

-- CASO 3: Pegar nova task (btn1)
local btn1 = bottomBar and bottomBar:getChildById("actionButton1")
if btn1 and btn1:isVisible() and btn1:isEnabled() then
    warn("[ZOLTAN] Pegando nova task!")
    btn1:onClick()
    delay(1500)
    -- Ler monstro apos pegar task
    identificarMonstro()
end

fecharZoltan()
return true
]]
label:VERIFICAR NOVA TASK
delay:2000
say("!taskfama")
delay:3000
function:[[
-- Verifica se conseguiu pegar task ou entrou em cooldown
-- Se zoltan_ir_zoltan ainda true = cooldown ativo
-- Aguarda e verifica de tempos em tempos
if zoltan_ir_zoltan then
    warn("[ZOLTAN] Cooldown ativo, aguardando...")
    if zoltan_cooldown_inicio == 0 then
        zoltan_cooldown_inicio = os.time()
    end
    -- Verifica se passou 10 horas (36000 segundos)
    local elapsed = os.time() - zoltan_cooldown_inicio
    if elapsed >= 36000 then
        warn("[ZOLTAN] 10 horas passaram! Indo pegar nova task.")
        zoltan_cooldown_inicio = 0
        zoltan_ir_zoltan = false
        gotoLabel("INTERAGIR ZOLTAN")
        return "retry"
    end
    delay(60000)
    return "retry"
end
zoltan_cooldown_inicio = 0
return true
]]
label:IDENTIFICAR MONSTRO
function:[[
-- Le o sectionLabel da janela para identificar o monstro
local root = g_ui:getRootWidget()
local zoltan = root:getChildById("zoltanWindow")
if zoltan then
    local secLabel = zoltan:getChildById("sectionLabel")
    if secLabel then
        local txt = secLabel:getText():lower()
        warn("[ZOLTAN] Task atual: " .. txt)
        if txt:find("tsuyoi kyojin") then
            zoltan_monstro = "tsuyoi_kyojin"
        elseif txt:find("jaakuna tako") then
            zoltan_monstro = "jaakuna_tako"
        else
            zoltan_monstro = "sem_cave"
            warn("[ZOLTAN] Monstro sem cave mapeada!")
        end
    end
    local closeBtn = zoltan:getChildById("closeButton")
    if closeBtn then closeBtn:onClick() end
end
return true
]]
function:[[
if zoltan_monstro == "tsuyoi_kyojin" then
    gotoLabel("IR IWAGAKURE TSUYOI")
    return "retry"
end
-- monstro sem cave: aguarda no depot
warn("[ZOLTAN] Sem cave para esse monstro. Aguardando proximo ciclo.")
delay(3600000) -- 1 hora
gotoLabel("INTERAGIR ZOLTAN")
return "retry"
]]

