function:[[

local root = g_ui:getRootWidget()

local zoltan = root:getChildById("zoltanWindow")

if not zoltan then

    npcsay("hi")

    delay(1500)

    return "retry"

end

delay(1000)

zoltan = root:getChildById("zoltanWindow")

if not zoltan then return "retry" end

local statusLabel = zoltan:getChildById("statusLabel")

local status = statusLabel and statusLabel:getText():lower() or ""

warn("[CHECK] Status: " .. status)

local function fechar()

    local z = root:getChildById("zoltanWindow")

    if z then

        local cb = z:getChildById("closeButton")

        if cb then cb:onClick() end

    end

end

local function fecharSucesso()

    delay(1000)

    for _, w in ipairs(root:getChildren()) do

        local msgLabel = w:getChildById("messageBoxLabel")

        if msgLabel then

            local holder = w:getChildById("buttonHolder")

            if holder then

                for _, btn in ipairs(holder:getChildren()) do

                    btn:onClick()

                    warn("[CHECK] Janela sucesso fechada!")

                    break

                end

            end

            break

        end

    end

    delay(500)

end

-- Cooldown ativo

if status:find("cooldown") then

    warn("[CHECK] Cooldown ativo, voltando ao trainer...")

    fechar()

    return true

end

-- Task ja ativa

if status:find("fama ativa") then

    warn("[CHECK] Task ja ativa!")

    fechar()

    return true

end

local bottomBar = zoltan:getChildById("bottomBar")

if not bottomBar then fechar() return true end

-- Resgatar recompensa

local btn2 = bottomBar:getChildById("actionButton2")

if btn2 and btn2:isVisible() and btn2:isEnabled() then

    warn("[CHECK] Resgatando recompensa!")

    btn2:onClick()

    delay(1500)

    fecharSucesso()

    delay(1000)

    -- Reabrir janela para pegar nova task

    npcsay("hi")

    delay(1500)

    zoltan = root:getChildById("zoltanWindow")

    if not zoltan then return "retry" end

    delay(1000)

    bottomBar = zoltan:getChildById("bottomBar")

    if not bottomBar then fechar() return true end

end

-- Pegar nova task

local btn1 = bottomBar:getChildById("actionButton1")

if btn1 and btn1:isVisible() and btn1:isEnabled() then

    warn("[CHECK] Pegando nova task!")

    btn1:onClick()

    delay(1500)

    -- Verificar se pegou com sucesso

    zoltan = root:getChildById("zoltanWindow")

    if zoltan then

        local sl = zoltan:getChildById("statusLabel")

        local st = sl and sl:getText():lower() or ""

        if st:find("fama ativa") then

            warn("[CHECK] Nova task confirmada!")

        else

            warn("[CHECK] Status apos clicar: " .. st)

        end

    end

end

fechar()

return true


]]
